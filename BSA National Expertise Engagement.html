document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lick=\"{{ toggleMenu }}\" style=\"display:flex;align-items:center;gap:13px;background:#F4F3F0;border:1px solid #E2E0DC;border-radius:3px;padding:9px 14px;cursor:pointer;min-width:230px;\" style-hover=\"border-color:#C9C7C2\">\n        <span style=\"flex:1;text-align:left;\">\n          <span style=\"display:block;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#A7A9AE;font-weight:700;\">{{ currentKicker }}<\u002Fspan>\n          <span style=\"display:block;font-size:14px;font-weight:600;color:#16181D;margin-top:1px;\">{{ currentLabel }}<\u002Fspan>\n        <\u002Fspan>\n        <span style=\"flex:none;color:#9A9CA1;font-size:11px;transform:{{ chevron }};transition:transform .15s;\">▾<\u002Fspan>\n      <\u002Fbutton>\n      <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:calc(100% + 6px);right:0;width:288px;background:#fff;border:1px solid #E2E0DC;border-radius:4px;box-shadow:0 14px 40px rgba(0,0,0,.16);overflow:hidden;z-index:60;\">\n          <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ item.onClick }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:0;border-left:{{ item.bl }};background:{{ item.bg }};padding:12px 16px;cursor:pointer;\" style-hover=\"background:#FAF9F7\">\n              <span style=\"flex:1;\">\n                <span style=\"display:block;font-size:13.5px;font-weight:600;color:{{ item.fg }};\">{{ item.label }}<\u002Fspan>\n                <span style=\"display:block;font-size:11px;margin-top:1px;color:{{ item.subfg }};\">{{ item.sub }}<\u002Fspan>\n              <\u002Fspan>\n              <sc-if value=\"{{ item.active }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"flex:none;color:#D6202E;font-size:13px;\">●<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fheader>\n  <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeMenu }}\" style=\"position:fixed;inset:0;z-index:40;\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <main style=\"min-width:0;\">\n\n    <sc-if value=\"{{ isPortfolio }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:34px 44px 64px;max-width:1340px;\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:28px;flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9A9CA1;font-weight:600;margin-bottom:9px;\">Leadership review<\u002Fdiv>\n            <h1 style=\"font-family:'Jost';font-weight:400;font-size:38px;letter-spacing:-.01em;margin:0;color:#16181D;\">Tracked Projects<\u002Fh1>\n            <p style=\"margin:9px 0 0;font-size:14.5px;color:#6E7177;max-width:560px;line-height:1.55;\">Our top projects and where National Expertise is deployed. Click any tier or expertise cell to assign team members or adjust the designation.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ goEvaluate }}\" style=\"flex:none;background:#D6202E;color:#fff;border:0;border-radius:2px;padding:13px 20px;font-size:13.5px;font-weight:600;cursor:pointer;letter-spacing:.01em;\">Evaluate a project →<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#E6E4E0;border:1px solid #E6E4E0;border-radius:3px;overflow:hidden;margin-bottom:30px;\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;padding:20px 22px;\">\n              <div style=\"font-family:'Jost';font-weight:400;font-size:42px;line-height:1;color:{{ k.accent }};\">{{ k.value }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6E7177;margin-top:9px;line-height:1.4;\">{{ k.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px;\">\n          <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Sort by<\u002Fspan>\n          <sc-for list=\"{{ sortControls }}\" as=\"sc\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ sc.onClick }}\" style=\"padding:7px 14px;border-radius:2px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid {{ sc.bc }};background:{{ sc.bg }};color:{{ sc.fg }};\">{{ sc.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"overflow-x:auto;\">\n        <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;overflow:hidden;min-width:980px;\">\n          <div style=\"display:grid;grid-template-columns:1.9fr 58px 1.05fr 1.05fr 1.05fr 1.05fr 30px;padding:14px 20px;border-bottom:1px solid #E6E4E0;background:#FAF9F7;\">\n            <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Project<\u002Fdiv>\n            <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Tier<\u002Fdiv>\n            <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Principal<\u002Fdiv>\n            <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Design<\u002Fdiv>\n            <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Planning<\u002Fdiv>\n            <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Innovation<\u002Fdiv>\n            <div><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ projectRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:1.9fr 58px 1.05fr 1.05fr 1.05fr 1.05fr 30px;padding:13px 20px;border-bottom:1px solid #F0EEEA;align-items:center;\">\n              <div style=\"padding-right:12px;\">\n                <div style=\"font-size:14px;font-weight:600;color:#16181D;\">{{ row.name }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:3px;\">\n                  <span style=\"font-size:13px;font-weight:700;color:#16181D;font-variant-numeric:tabular-nums;\">{{ row.fee }}<\u002Fspan>\n                  <span style=\"width:3px;height:3px;border-radius:50%;background:#CFCDC9;\"><\u002Fspan>\n                  <span style=\"font-size:11.5px;color:#9A9CA1;\">{{ row.practice }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <button onclick=\"{{ row.onEditTier }}\" title=\"Set tier\" style=\"width:30px;height:30px;border-radius:4px;border:{{ row.tierBorder }};background:{{ row.tierColor }};color:{{ row.tierFg }};font-family:'Jost';font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;\" style-hover=\"filter:brightness(.94)\">{{ row.tier }}<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"padding-right:10px;font-size:12.5px;color:#5C5F66;\">{{ row.principal }}<\u002Fdiv>\n              <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ cell.onEdit }}\" title=\"Edit assignment\" style=\"text-align:left;border:0;background:transparent;cursor:pointer;padding:6px 8px;margin:-6px 6px -6px -8px;border-radius:3px;min-height:30px;display:block;width:100%;\" style-hover=\"background:#F4F3F0\">\n                  <sc-if value=\"{{ cell.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"display:inline-block;font-size:11px;color:#C0413F;border:1px dashed #E4B4B2;border-radius:2px;padding:3px 8px;background:#FCF4F3;\">Unassigned<\u002Fspan>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:5px;\">\n                    <sc-for list=\"{{ cell.people }}\" as=\"person\" hint-placeholder-count=\"1\">\n                      <span style=\"display:inline-block;font-size:11.5px;color:#16181D;background:#F1EFEB;border-radius:2px;padding:3px 7px;\">{{ person }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n              <div style=\"display:flex;justify-content:flex-end;\">\n                <button onclick=\"{{ row.onDelete }}\" title=\"Remove project\" style=\"border:0;background:transparent;color:#C9CBCF;font-size:16px;cursor:pointer;line-height:1;padding:2px 4px;\" style-hover=\"color:#D6202E\">×<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#9A9CA1;margin-top:14px;display:flex;align-items:center;gap:9px;\"><span style=\"width:11px;height:11px;border:1px dashed #E4B4B2;background:#FCF4F3;display:inline-block;border-radius:1px;\"><\u002Fspan> Dashed cells are open National Expertise assignments awaiting a leadership decision. Click any cell to assign people, or a tier badge to change the designation.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px;font-size:12px;color:#B0B2B6;\">\n          <span>Your edits save automatically to this browser.<\u002Fspan>\n          <button onclick=\"{{ resetData }}\" style=\"border:0;background:transparent;color:#B0B2B6;font-size:12px;cursor:pointer;text-decoration:underline;padding:0;\" style-hover=\"color:#D6202E\">Reset to demo data<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ editorOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onclick=\"{{ closeEditor }}\" style=\"position:fixed;inset:0;background:rgba(22,24,29,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:24px;\">\n            <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:4px;width:430px;max-width:100%;max-height:82vh;overflow:auto;box-shadow:0 18px 55px rgba(0,0,0,.28);\">\n              <div style=\"padding:20px 22px;border-bottom:1px solid #F0EEEA;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;position:sticky;top:0;background:#fff;\">\n                <div>\n                  <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">{{ editorKicker }}<\u002Fdiv>\n                  <div style=\"font-size:17px;font-weight:700;color:#16181D;margin-top:4px;\">{{ editorProjectName }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ closeEditor }}\" style=\"border:0;background:transparent;font-size:20px;color:#B7B9BD;cursor:pointer;line-height:1;\">×<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"padding:18px 22px;\">\n                <sc-if value=\"{{ editorIsTier }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                    <sc-for list=\"{{ editorTierOpts }}\" as=\"t\" hint-placeholder-count=\"5\">\n                      <button onclick=\"{{ t.onClick }}\" style=\"display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:3px;border:1px solid {{ t.bc }};background:{{ t.bg }};cursor:pointer;text-align:left;\" style-hover=\"background:#FAF9F7\">\n                        <span style=\"flex:none;width:34px;height:34px;border-radius:4px;background:{{ t.color }};color:#fff;font-family:'Jost';font-size:18px;display:flex;align-items:center;justify-content:center;\">{{ t.letter }}<\u002Fspan>\n                        <span><span style=\"font-size:14px;font-weight:700;color:#16181D;display:block;\">{{ t.name }}<\u002Fspan><span style=\"font-size:12px;color:#8A8D93;\">{{ t.desc }}<\u002Fspan><\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ editorIsPeople }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div>\n                    <div style=\"font-size:13px;color:#8A8D93;margin-bottom:12px;\">Check the {{ editorCatLabel }} resources assigned to this project.<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:2px;\">\n                      <sc-for list=\"{{ editorPeople }}\" as=\"m\" hint-placeholder-count=\"6\">\n                        <button onclick=\"{{ m.onToggle }}\" style=\"display:flex;align-items:center;gap:11px;padding:9px 10px;border:0;border-radius:3px;background:{{ m.bg }};cursor:pointer;text-align:left;\" style-hover=\"background:#F4F3F0\">\n                          <span style=\"flex:none;width:18px;height:18px;border-radius:3px;border:1px solid {{ m.boxBc }};background:{{ m.boxBg }};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;\">{{ m.check }}<\u002Fspan>\n                          <span style=\"flex:1;\"><span style=\"font-size:14px;font-weight:600;color:#16181D;display:block;\">{{ m.name }}<\u002Fspan><span style=\"font-size:11.5px;color:#9A9CA1;\">{{ m.role }} · {{ m.studio }}<\u002Fspan><\u002Fspan>\n                        <\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"padding:14px 22px;border-top:1px solid #F0EEEA;display:flex;justify-content:flex-end;position:sticky;bottom:0;background:#fff;\">\n                <button onclick=\"{{ closeEditor }}\" style=\"background:#16181D;color:#fff;border:0;border-radius:2px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;\">Done<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isEvaluate }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:34px 44px 64px;max-width:980px;\">\n        <div style=\"margin-bottom:22px;\">\n          <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9A9CA1;font-weight:600;margin-bottom:9px;\">Decision support<\u002Fdiv>\n          <h1 style=\"font-family:'Jost';font-weight:400;font-size:34px;margin:0;color:#16181D;\">Evaluate a project<\u002Fh1>\n          <p style=\"margin:9px 0 0;font-size:14px;color:#6E7177;max-width:560px;line-height:1.55;\">Mark where the assigned team is strong. The facilitator frames how much National Expertise this work needs — and what leadership should talk through.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;margin-bottom:28px;border:1px solid #E6E4E0;border-radius:3px;overflow:hidden;background:#fff;\">\n          <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ st.onClick }}\" style=\"flex:1;display:flex;align-items:center;gap:11px;padding:14px 18px;border:0;border-right:1px solid #F0EEEA;background:transparent;cursor:pointer;text-align:left;\">\n              <span style=\"flex:none;width:26px;height:26px;border-radius:50%;border:1px solid {{ st.numBc }};background:{{ st.numBg }};color:{{ st.numFg }};font-family:'Jost';font-size:14px;display:flex;align-items:center;justify-content:center;\">{{ st.n }}<\u002Fspan>\n              <span style=\"font-size:13px;font-weight:600;color:{{ st.labelFg }};\">{{ st.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ s1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <label style=\"display:block;margin-bottom:18px;cursor:pointer;\">\n            <input type=\"file\" onchange=\"{{ onFile }}\" accept=\".pdf,.doc,.docx,.txt,.md,.rtf\" style=\"position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;\">\n            <div style=\"background:#fff;border:1px dashed #C9A6A4;border-radius:3px;padding:18px 20px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#D6202E;background:#FDF9F8\">\n              <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#FCEFEF;display:flex;align-items:center;justify-content:center;\">\n                <sc-if value=\"{{ afBusy }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"width:18px;height:18px;border:2px solid #EFC9C7;border-top-color:#D6202E;border-radius:50%;display:block;animation:spin .8s linear infinite;\"><\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ afIdle }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"font-size:19px;color:#D6202E;\">↑<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ afDone }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:18px;color:#2FA866;\">✓<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ afError }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:18px;color:#D6202E;\">!<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"flex:1;\">\n                <div style=\"font-size:14px;font-weight:700;color:#16181D;\">Upload a proposal, RFP, or pursuit document<\u002Fdiv>\n                <sc-if value=\"{{ afHasMsg }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:12.5px;color:#6E7177;margin-top:3px;line-height:1.4;\">{{ afMessage }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ afIdle }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"font-size:12.5px;color:#9A9CA1;margin-top:3px;\">PDF or Word — the facilitator reads it and fills in everything it can find. PDF, DOCX, TXT.<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <sc-if value=\"{{ afIdle }}\" hint-placeholder-val=\"{{ true }}\">\n                <span style=\"flex:none;background:#16181D;color:#fff;border-radius:2px;padding:9px 16px;font-size:12.5px;font-weight:600;\">Choose file<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Flabel>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n            <div style=\"flex:1;height:1px;background:#ECEAE6;\"><\u002Fdiv>\n            <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#B7B9BD;font-weight:600;\">or enter details manually<\u002Fspan>\n            <div style=\"flex:1;height:1px;background:#ECEAE6;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:28px;\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px 20px;\">\n              <div style=\"grid-column:1 / -1;\">\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Project name<\u002Flabel>\n                <input value=\"{{ form.name }}\" onchange=\"{{ onName }}\" placeholder=\"e.g. Houston Methodist Tower\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Practice<\u002Flabel>\n                <select value=\"{{ form.practice }}\" onchange=\"{{ onPractice }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                  <option value=\"Healing\">Healing<\u002Foption>\n                  <option value=\"Learning\">Learning<\u002Foption>\n                  <option value=\"Discovery\">Discovery<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Studio<\u002Flabel>\n                <input value=\"{{ form.studio }}\" onchange=\"{{ onStudio }}\" placeholder=\"e.g. St. Louis\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Project phase<\u002Flabel>\n                <select value=\"{{ form.phase }}\" onchange=\"{{ onPhase }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                  <option value=\"\">Select phase…<\u002Foption>\n                  <option value=\"Pursuit / BD\">Pursuit / BD<\u002Foption>\n                  <option value=\"Proposal\">Proposal<\u002Foption>\n                  <option value=\"Kickoff\">Kickoff<\u002Foption>\n                  <option value=\"Schematic Design\">Schematic Design<\u002Foption>\n                  <option value=\"Design Development\">Design Development<\u002Foption>\n                  <option value=\"Construction Docs\">Construction Docs<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Known team members<\u002Flabel>\n                <input value=\"{{ form.team }}\" onchange=\"{{ onTeam }}\" placeholder=\"Names, comma separated\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n              <\u002Fdiv>\n              <div style=\"grid-column:1 / -1;\">\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Project description<\u002Flabel>\n                <textarea value=\"{{ form.description }}\" onchange=\"{{ onDesc }}\" placeholder=\"Scope, size, client, and what makes this project notable.\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;min-height:74px;resize:vertical;line-height:1.5;\" style-focus=\"border-color:#D6202E\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"grid-column:1 / -1;\">\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Key concerns<\u002Flabel>\n                <textarea value=\"{{ form.concerns }}\" onchange=\"{{ onConcerns }}\" placeholder=\"Risks, complexity, client expectations, anything keeping you up at night.\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 12px;font-size:14px;color:#16181D;background:#FCFBFA;min-height:64px;resize:vertical;line-height:1.5;\" style-focus=\"border-color:#D6202E\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"grid-column:1 / -1;\">\n                <label style=\"font-size:12px;font-weight:600;color:#6E7177;letter-spacing:.02em;display:block;margin-bottom:7px;\">Pursuit material <span style=\"color:#B7B9BD;font-weight:500;\">— optional<\u002Fspan><\u002Flabel>\n                <textarea value=\"{{ form.attachment }}\" onchange=\"{{ onAttach }}\" placeholder=\"Paste RFP, pursuit, or project-descri t:700;display:block;margin-bottom:3px;\">Name<\u002Flabel>\n                    <input value=\"{{ p.name }}\" onchange=\"{{ p.onEditName }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:7px 9px;font-size:14px;font-weight:600;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#9A9CA1;font-weight:700;display:block;margin-bottom:3px;\">Group<\u002Flabel>\n                    <select value=\"{{ p.group }}\" onchange=\"{{ p.onEditGroup }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:7px 9px;font-size:13px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                      <option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption>\n                    <\u002Fselect>\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#9A9CA1;font-weight:700;display:block;margin-bottom:3px;\">Role<\u002Flabel>\n                    <input value=\"{{ p.role }}\" onchange=\"{{ p.onEditRole }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:7px 9px;font-size:13px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#9A9CA1;font-weight:700;display:block;margin-bottom:3px;\">Studio<\u002Flabel>\n                    <input value=\"{{ p.studio }}\" onchange=\"{{ p.onEditStudio }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:7px 9px;font-size:13px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#9A9CA1;font-weight:700;display:block;margin-bottom:3px;\">Primary focus<\u002Flabel>\n                    <input value=\"{{ p.focus }}\" onchange=\"{{ p.onEditFocus }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:7px 9px;font-size:13px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ p.notEditing }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:16px;font-weight:700;color:#16181D;\">{{ p.name }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#5C5F66;margin-top:2px;\">{{ p.role }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#9A9CA1;margin-top:7px;\">{{ p.studio }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#6E7177;line-height:1.5;margin-top:9px;\">Primary focus — {{ p.focus }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"border-top:1px solid #F0EEEA;margin-top:13px;padding-top:13px;\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;\">\n                  <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ p.capColor }};\"><\u002Fspan><span style=\"font-size:11.5px;font-weight:600;color:#6E7177;\">{{ p.capLabel }}<\u002Fspan><\u002Fspan>\n                  <span style=\"font-size:11.5px;color:#9A9CA1;\">{{ p.pct }}% loaded<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:6px;border-radius:3px;background:#F0EEEA;overflow:hidden;\">\n                  <div style=\"height:100%;width:{{ p.barW }};background:{{ p.capColor }};border-radius:3px;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#9A9CA1;margin-top:7px;\">{{ p.loadAmt }} weighted load · {{ p.countLabel }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px;\">\n                  <span style=\"font-size:10.5px;letter-spacing:.08em;color:#9A9CA1;font-weight:600;\">CAPACITY<\u002Fspan>\n                  <span style=\"font-size:12px;color:#9A9CA1;\">$<\u002Fspan>\n                  <input type=\"number\" value=\"{{ p.capacity }}\" onchange=\"{{ p.onCapacity }}\" min=\"0\" step=\"0.5\" title=\"Concurrent BSA fee this person can carry at full load\" style=\"width:58px;border:1px solid #E2E0DC;border-radius:2px;padding:5px 7px;font-size:12.5px;color:#16181D;background:#FCFBFA;text-align:center;\" style-focus=\"border-color:#D6202E\">\n                  <span style=\"font-size:12px;color:#9A9CA1;\">M at full load<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isFramework }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:34px 44px 72px;max-width:1060px;\">\n        <div style=\"margin-bottom:8px;\">\n          <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9A9CA1;font-weight:600;margin-bottom:9px;\">A common language<\u002Fdiv>\n          <h1 style=\"font-family:'Jost';font-weight:400;font-size:38px;margin:0;color:#16181D;\">Engagement Framework<\u002Fh1>\n          <p style=\"margin:10px 0 0;font-size:14.5px;color:#6E7177;max-width:600px;line-height:1.6;\">A shared way to define how much Design, Planning, and Innovation a project needs — matched to its complexity and strategic importance. The framework brings consistency to how expertise is deployed, sets clear expectations for project teams, and makes engagement visible across the whole portfolio. It right-sizes involvement; it never lowers the standard of excellence we expect on every project.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"margin:28px 0 30px;\">\n          <div style=\"font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9A9CA1;font-weight:700;margin-bottom:14px;\">How this fits the bigger effort<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#6E7177;line-height:1.6;max-width:640px;margin:0 0 18px;\">We're connecting expertise to projects on three fronts — the goal of all three is to engage Design, Planning, and Innovation <span style=\"color:#16181D;font-weight:600;\">before<\u002Fspan> work is won, so staffing becomes proactive instead of a scramble after the fact.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n            <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:18px 20px;\">\n              <div style=\"font-family:'Jost';font-size:24px;color:#C9CBCF;line-height:1;margin-bottom:11px;\">01<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;color:#16181D;margin-bottom:6px;\">Client Teams<\u002Fdiv>\n              <div style=\"font-size:13px;color:#6E7177;line-height:1.5;\">Design, Planning, and Innovation join strategic client relationships — not just a single BD champion — so expertise is connected from the start.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:18px 20px;\">\n              <div style=\"font-family:'Jost';font-size:24px;color:#C9CBCF;line-height:1;margin-bottom:11px;\">02<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;color:#16181D;margin-bottom:6px;\">BD Huddles<\u002Fdiv>\n              <div style=\"font-size:13px;color:#6E7177;line-height:1.5;\">Expertise leaders sit in on recurring business-development huddles, gaining visibility into pursuits and shaping strategy before delivery begins.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #D6202E;border-radius:3px;padding:18px 20px;position:relative;\">\n              <div style=\"position:absolute;top:14px;right:14px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#D6202E;font-weight:700;\">You are here<\u002Fdiv>\n              <div style=\"font-family:'Jost';font-size:24px;color:#E7A9A6;line-height:1;margin-bottom:11px;\">03<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;color:#16181D;margin-bottom:6px;\">Engagement Framework<\u002Fdiv>\n              <div style=\"font-size:13px;color:#6E7177;line-height:1.5;\">The common A–D language below for how much expertise each project needs — the foundation this tool uses to track and right-size engagement.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9A9CA1;font-weight:700;margin-bottom:14px;\">The four engagement tiers<\u002Fdiv>\n\n        <sc-for list=\"{{ tiers }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:26px;background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:26px;margin-bottom:14px;\">\n            <div style=\"flex:none;width:96px;text-align:center;\">\n              <div style=\"width:84px;height:84px;border-radius:6px;background:{{ t.color }};display:flex;align-items:center;justify-content:center;margin:0 auto 10px;\">\n                <span style=\"font-family:'Jost';font-weight:300;font-size:50px;color:#fff;line-height:1;\">{{ t.letter }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'Jost';font-size:15px;color:#16181D;\">{{ t.name }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:15.5px;color:#2A2D33;line-height:1.55;margin-bottom:18px;max-width:580px;\">{{ t.blurb }}<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px;\">\n                <div>\n                  <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;margin-bottom:11px;\">Typical characteristics<\u002Fdiv>\n                  <sc-for list=\"{{ t.chars }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;gap:9px;padding:5px 0;align-items:flex-start;\"><span style=\"flex:none;width:5px;height:5px;border-radius:50%;background:{{ t.color }};margin-top:8px;\"><\u002Fspan><span style=\"font-size:13.5px;color:#4A4D53;line-height:1.5;\">{{ c }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#9A9CA1;font-weight:700;margin-bottom:11px;\">Expected involvement<\u002Fdiv>\n                  <sc-for list=\"{{ t.involve }}\" as=\"iv\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;gap:9px;padding:5px 0;align-items:flex-start;\"><span style=\"flex:none;width:5px;height:5px;border-radius:50%;background:#D8D6D2;margin-top:8px;\"><\u002Fspan><span style=\"font-size:13.5px;color:#4A4D53;line-height:1.5;\">{{ iv }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ t.note }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:18px;background:#FCF4F3;border:1px solid #F0D9D7;border-radius:2px;padding:13px 15px;font-size:13.5px;color:#9A3B3A;line-height:1.5;\">{{ t.note }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isTodos }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:34px 44px 72px;max-width:920px;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:24px;flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9A9CA1;font-weight:600;margin-bottom:9px;\">Follow-ups<\u002Fdiv>\n            <h1 style=\"font-family:'Jost';font-weight:400;font-size:38px;margin:0;color:#16181D;\">To-Dos<\u002Fh1>\n            <p style=\"margin:9px 0 0;font-size:14.5px;color:#6E7177;max-width:560px;line-height:1.55;\">Capture the follow-ups that come out of staffing conversations — availability checks, missing information, assumptions to validate.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:22px;\">\n            <div style=\"text-align:right;\"><div style=\"font-family:'Jost';font-size:30px;line-height:1;color:#16181D;\">{{ todoOpenCount }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9A9CA1;margin-top:4px;\">Open<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:right;\"><div style=\"font-family:'Jost';font-size:30px;line-height:1;color:{{ overdueColor }};\">{{ todoOverdueCount }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9A9CA1;margin-top:4px;\">Overdue<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:16px 18px;margin-bottom:18px;display:grid;grid-template-columns:1fr 200px 168px 92px;gap:12px;align-items:end;\">\n          <div>\n            <label style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9A9CA1;display:block;margin-bottom:6px;\">What needs to happen<\u002Flabel>\n            <input value=\"{{ todoForm.what }}\" onchange=\"{{ onTodoWhat }}\" placeholder=\"e.g. Confirm Christie's availability for Q3\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:9px 11px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9A9CA1;display:block;margin-bottom:6px;\">Owner<\u002Flabel>\n            <input value=\"{{ todoForm.owner }}\" onchange=\"{{ onTodoOwner }}\" list=\"bsa-team-names\" placeholder=\"Who owns it\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:9px 11px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9A9CA1;display:block;margin-bottom:6px;\">Due<\u002Flabel>\n            <input type=\"date\" value=\"{{ todoForm.due }}\" onchange=\"{{ onTodoDue }}\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:8px 11px;font-size:14px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n          <\u002Fdiv>\n          <button onclick=\"{{ addTodo }}\" style=\"background:#D6202E;color:#fff;border:0;border-radius:2px;padding:10px 14px;font-size:13.5px;font-weight:600;cursor:pointer;height:39px;\">Add<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ todoEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fff;border:1px dashed #E2E0DC;border-radius:3px;padding:46px;text-align:center;\">\n            <div style=\"font-size:15px;font-weight:600;color:#16181D;\">No to-dos yet<\u002Fdiv>\n            <div style=\"font-size:13px;color:#9A9CA1;margin-top:6px;\">Add the first follow-up above — it'll save automatically.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;overflow:hidden;\">\n          <sc-for list=\"{{ todoRows }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid #F0EEEA;\">\n              <button onclick=\"{{ t.onToggle }}\" title=\"Mark done\" style=\"flex:none;width:20px;height:20px;border-radius:4px;border:1.5px solid {{ t.boxBc }};background:{{ t.boxBg }};color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;\">{{ t.check }}<\u002Fbutton>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font-size:14.5px;font-weight:600;color:{{ t.whatColor }};text-decoration:{{ t.whatDeco }};\">{{ t.what }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:4px;\">\n                  <span style=\"font-size:12px;color:#16181D;background:#F1EFEB;border-radius:2px;padding:2px 8px;white-space:nowrap;\">{{ t.owner }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:none;text-align:right;min-width:104px;\">\n                <div style=\"font-size:13px;color:{{ t.dueColor }};font-weight:{{ t.dueWeight }};white-space:nowrap;\">{{ t.due }}<\u002Fdiv>\n                <sc-if value=\"{{ t.overdue }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#D6202E;font-weight:700;margin-top:2px;\">Overdue<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <button onclick=\"{{ t.onDelete }}\" title=\"Delete\" style=\"flex:none;border:0;background:transparent;color:#C9CBCF;font-size:16px;cursor:pointer;line-height:1;padding:2px 4px;\" style-hover=\"color:#D6202E\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isGrowth }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:34px 44px 72px;max-width:1100px;\">\n        <div style=\"margin-bottom:22px;\">\n          <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9A9CA1;font-weight:600;margin-bottom:9px;\">Talent pipeline<\u002Fdiv>\n          <h1 style=\"font-family:'Jost';font-weight:400;font-size:38px;margin:0;color:#16181D;\">Development &amp; Growth Plan<\u002Fh1>\n          <p style=\"margin:9px 0 0;font-size:14.5px;color:#6E7177;max-width:620px;line-height:1.55;\">Identify and track rising talent across Architecture, Engineering, and Interiors — and keep a healthy pipeline of future National Expertise. Notes save as you type.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:24px;\">\n          <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:20px 22px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;\">\n              <span style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Candidates by studio<\u002Fspan>\n              <span style=\"font-size:12px;color:#9A9CA1;\"><span style=\"font-family:'Jost';font-size:18px;color:#16181D;\">{{ growthTotal }}<\u002Fspan> tracked<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ studioBars }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:9px;\">\n                <span style=\"flex:none;width:88px;font-size:12.5px;color:#5C5F66;\">{{ s.studio }}<\u002Fspan>\n                <div style=\"flex:1;height:14px;background:#F2F0EC;border-radius:3px;overflow:hidden;\"><div style=\"height:100%;width:{{ s.w }};background:{{ s.color }};border-radius:3px;\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"flex:none;width:20px;text-align:right;font-size:13px;font-weight:700;color:{{ s.countColor }};\">{{ s.count }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font-size:11.5px;color:#9A9CA1;margin-top:12px;line-height:1.45;\">Studios reading <span style=\"color:#C0413F;font-weight:600;\">0<\u002Fspan> are pipeline gaps — candidates for development focus or strategic hiring.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E6E4E0;border-radius:3px;padding:20px 22px;\">\n            <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A9CA1;font-weight:700;margin-bottom:16px;\">By focus track<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <sc-for list=\"{{ trackCounts }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:11px;\">\n                  <span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:{{ t.color }};\"><\u002Fspan>\n                  <span style=\"flex:1;font-size:13.5px;color:#16181D;font-weight:600;\">{{ t.track }}<\u002Fspan>\n                  <span style=\"font-family:'Jost';font-size:22px;color:#16181D;line-height:1;\">{{ t.count }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;\">\n          <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap;\">\n            <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9A9CA1;font-weight:700;\">Sort by<\u002Fspan>\n            <sc-for list=\"{{ growthSortControls }}\" as=\"sc\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ sc.onClick }}\" style=\"padding:7px 13px;border-radius:2px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid {{ sc.bc }};background:{{ sc.bg }};color:{{ sc.fg }};\">{{ sc.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ toggleGrowthAdd }}\" style=\"flex:none;background:#16181D;color:#fff;border:0;border-radius:2px;padding:9px 16px;font-size:12.5px;font-weight:600;curso                   <option value=\"{{ o.value }}\">{{ o.value }}<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:13px;\">\n              <label style=\"font-size:11px;font-weight:600;color:#9A9CA1;letter-spacing:.04em;display:block;margin-bottom:6px;\">D&amp;P MENTOR(S)<\u002Flabel>\n              <input value=\"{{ growthForm.mentors }}\" onchange=\"{{ onGrowthMentors }}\" list=\"bsa-team-names\" placeholder=\"Mentor name(s), comma separated\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:9px 11px;font-size:13.5px;color:#16181D;background:#FCFBFA;\" style-focus=\"border-color:#D6202E\">\n            <\u002Fdiv>\n            <div style=\"margin-bottom:16px;\">\n              <label style=\"font-size:11px;font-weight:600;color:#9A9CA1;letter-spacing:.04em;display:block;margin-bottom:6px;\">IDENTIFIED OPPORTUNITIES FOR GROWTH<\u002Flabel>\n              <textarea value=\"{{ growthForm.notes }}\" onchange=\"{{ onGrowthNotes }}\" placeholder=\"Strengths, stretch goals, the kind of project that would develop them…\" style=\"width:100%;border:1px solid #D8D6D2;border-radius:2px;padding:10px 11px;font-size:13.5px;color:#16181D;background:#FCFBFA;min-height:76px;resize:vertical;line-height:1.5;\" style-focus=\"border-color:#D6202E\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:flex-end;gap:10px;\">\n              <button onclick=\"{{ toggleGrowthAdd }}\" style=\"background:transparent;border:0;color:#8A8D93;font-size:13px;font-weight:600;cursor:pointer;padding:9px 14px;\">Cancel<\u002Fbutton>\n              <button onclick=\"{{ submitGrowth }}\" style=\"background:#D6202E;color:#fff;border:0;border-radius:2px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;\">Add candidate<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ growthEmpty } rn buckets;\n  }\n\n  setSort(key){this.setState(s=>{if(s.sortKey===key)return {sortDir:s.sortDir==='asc'?'desc':'asc'};return {sortKey:key,sortDir:'asc'};});}\n\n  addToPortfolio(){\n    const r=this.state.ai.result; if(!r) return;\n    const f=this.state.form;\n    const det=this.detectMembers();\n    this.setProjects(projects=>{const nextId=projects.reduce((m,p)=>Math.max(m,p.id||0),0)+1;const proj={id:nextId,name:f.name||'Untitled pursuit',practice:f.practice||'—',tier:r.tier,design:det.design,planning:det.planning,innovation:det.innovation};return [proj,...projects];});\n    this.setState({view:'portfolio'});\n    this.resetEval();\n  }\n\n  openEditor(projectId,field){this.setState({editor:{open:true,projectId,field}});}\n  closeEditor(){this.setState({editor:{open:false,projectId:null,field:null}});}\n  toggleAssign(id,field,name){this.setProjects(projects=>projects.map(p=>{if(p.id!==id)return p;const arr=p[field]||[];const has=arr.includes(name);return {...p,[field]:has?arr.filter(n=>n!==name):[...arr,name]};}));}\n  setTier(id,tier){this.setProjects(projects=>projects.map(p=>p.id===id?{...p,tier}:p));}\n  deleteProject(id){this.setProjects(projects=>projects.filter(p=>p.id!==id));this.setState({editor:{open:false,projectId:null,field:null}});}\n\n  async readFileText(file){\n    const name=(file.name||'').toLowerCase();\n    if(name.endsWith('.pdf')){\n      const lib=window.pdfjsLib; if(!lib) throw new Error('PDF reader unavailable');\n      try{lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}catch(e){}\n      const data=await file.arrayBuffer();\n      const pdf=await lib.getDocument({data}).promise;\n      let out='';\n      for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const c=await page.getTextContent();out+=c.items.map(it=>it.str).join(' ')+'\\n';}\n      return out;\n    }\n    if(name.endsWith('.docx')){\n      const m=window.mammoth; if(!m) throw new Error('Word reader ning, Discovery, or empty (Healing=healthcare, Learning=education, Discovery=research/labs). phase must exactly match one listed option or be empty. Never invent facts not supported by the document. If a field is unknown, use an empty string.\",\n      \"\",\n      \"DOCUMENT:\",\n      String(text).slice(0,16000)\n    ].join(\"\\n\");\n    try{\n      if(!(window.claude&&window.claude.complete)) throw new Error('no-helper');\n      const raw=await window.claude.complete(prompt);\n      const j=this.extractJSON(raw);\n      if(!j) throw new Error('bad-json');\n      const practices=['Healing','Learning','Discovery'];\n      const phases=['Pursuit / BD','Proposal','Kickoff','Schematic Design','Design Development','Construction Docs'];\n      this.setState(s=>{\n        const f={...s.form};\n        if(j.name) f.name=String(j.name).slice(0,140);\n        if(j.studio) f.studio=String(j.studio).slice(0,120);\n        if(j.description) f.description=String(j.description).slice(0,800);\n        if(j.concerns) f.concerns=String(j.concerns).slice(0,800);\n        if(j.team) f.team=String(j.team).slice(0,400);\n        if(practices.includes(j.practice)) f.practice=j.practice;\n        if(phases.includes(j.phase)) f.phase=j.phase;\n        const filled=['name','studio','description','concerns','team'].filter(k=>f[k]&&f[k].trim()).length+(practices.includes(j.practice)?1:0)+(phases.includes(j.phase)?1:0);\n        return {form:f,autofill:{status:'done',filename:filename||'',message:'Filled '+filled+' field'+(filled===1?'':'s')+' from '+(filename||'the document')+'. Review and edit anything below.'}};\n      });\n    }catch(err){\n      this.setState(s=>({autofill:{status:'error',filename:filename||'',message:'Saved the document text, but auto-fill is unavailable right now. Fill the fields below manually.'}}));\n    }\n  }\n\n  clearAutofill(){this.setState({autofill:{status:'idle',filename:'',message:''}});}\n\n  buildPrompt(){\n    const f=this.state.form,a=this.state.answers;\n    const strat=Object.keys(this.state.strategic).filter(k=>this.state.strategic[k]);\n    const L=(arr)=>arr.map(v=>v||'—');\n    const det=this.detectMembers();\n    const nd=det.design.length,np=det.planning.length,ni=det.innovation.length;\n    return [\n      \"You are the facilitation engine inside BSA LifeStructures' National Expertise Engagement decision-support tool.\",\n      \"You do NOT make staffing decisions. You help leadership decide how much National Expertise (Design, Planning, Innovation) a project needs, and surface questions for them to discuss. Be warm, concise, never bossy.\",\n      \"\",\n      \"Engagement tiers (letters, no ranking implied):\",\n      \"A = Lead — National Expertise actively leads strategy.\",\n      \"B = Guide — structured guidance: kickoffs, milestone reviews, critiques.\",\n      \"C = Support — set direction + QA/QC + consultation.\",\n      \"D = Local Delivery — the project team delivers BSA excellence with NO National Expertise involvement. This is NOT a quality compromise; it means the local team is fully capable.\",\n      \"\",\n      \"PROJECT\",\n      \"Name: \"+(f.name||'—'),\n      \"Practice: \"+(f.practice||'—')+\" | Studio: \"+(f.studio||'—')+\" | Phase: \"+(f.phase||'—'),\n      \"Description: \"+(f.description||'—'),\n      \"Key concerns: \"+(f.concerns||'—'),\n      \"Known team: \"+(f.team||'—'),\n      (f.attachment?(\"Pursuit material: \"+f.attachment):\"\"),\n      \"\",\n      \"NATIONAL EXPERTISE ALREADY ON THE SLATED TEAM (matched against the firm directory):\",\n      \"  Design members: \"+nd+(det.design.length?(\" (\"+det.design.join(', ')+\")\"):\"\"),\n      \"  Planning members: \"+np+(det.planning.length?(\" (\"+det.planning.join(', ')+\")\"):\"\"),\n      \"  Innovation members: \"+ni+(det.innovation.length?(\" (\"+det.innovation.join(', ')+\")\"):\"\"),\n      \"\",\n      \"*** PRIMARY TIER RULE — read carefully ***\",\n      \"The tier reflects how much National Expertise is ENGAGED on this project — NOT whether the team is skilled. If National Expertise members are already staffed on the team, that expertise IS engaged, and that RAISES the tier. Do NOT lower the tier just because a well-staffed team is judged capable.\",\n      \"Apply this per discipline, then take the highest as the overall tier:\",\n      \"  - 2 or more National Expertise members already on the team in a discipline  => that discipline is Tier A (National Expertise is leading it). A project loaded with multiple Design & Planning leaders at the start is almost always Tier A overall.\",\n      \"  - Exactly 1 National Expertise member in a discipline  => Tier B (guide), or C if the work is routine.\",\n      \"  - 0 National Expertise members in a discipline  => judge by the capability answers below: if the team can deliver as staffed (mostly 'Yes'), it trends C or D; if they answered 'Maybe' or 'No' (they NEED more), it trends B or A because National Expertise must be ADDED.\",\n      \"Capability answers REFINE this; staffing presence SETS THE FLOOR. The overall tier is the highest of the three discipline tiers.\",\n      \"\",\n      \"DOES THE CURRENTLY SLATED TEAM HAVE THE CAPACITY & ABILITY TO… (Yes / Maybe / No). NOTE: 'Yes' = they can carry it as staffed; 'Maybe' = partial, could use support; 'No' = they need more National Expertise (NOT a judgment that they are unskilled).\",\n      \"Design — concept: \"+L(a.design)[0]+\"; narrative: \"+L(a.design)[1]+\"; visioning: \"+L(a.design)[2]+\"; deliver design excellence as staffed: \"+L(a.design)[3],\n      \"Planning — user engagement: \"+L(a.planning)[0]+\"; strategies: \"+L(a.planning)[1]+\"; challenge assumptions: \"+L(a.planning)[2]+\"; deliver planning excellence as staffed: \"+L(a.planning)[3],\n      \"Innovation — visualization: \"+L(a.innovation)[0]+\"; sustainability: \"+L(a.innovation)[1]+\"; AI/emerging tech: \"+L(a.innovation)[2]+\"; elevate via innovation as staffed: \"+L(a.innovation)[3],\n      \"\",\n      \"Talent-development opportunity: \"+(this.state.talent||'—'),\n      \"Strategic factors: \"+(strat.length?strat.join(', '):'none noted'),\n      \"\",\n      \"Respond with ONLY minified JSON (no markdown fences, no prose) in exactly this shape:\",\n      '{\"opener\":\"1-2 sentence warm framing that this is for discussion not a decision\",\"tier\":\"A or B or C or D overall\",\"reasoning\":\"2-3 sentences. Explicitly reference how many National Expertise members are already on the team and how that drove the tier, then how the capability answers refined it.\",\"engagement\":{\"design\":\"A/B/C/D\",\"planning\":\"A/B/C/D\",\"innovation\":\"A/B/C/D\"},\"discussion\":[\"2 to 4 short pointed questions for leadership\"]}'\n    ].filter(Boolean).join(\"\\n\");\n  }\n\n  extractJSON(raw){\n    try{\n      let s=String(raw).trim();\n      s=s.replace(/```json/gi,'').replace(/```/g,'').trim();\n      const a=s.indexOf('{'), b=s.lastIndexOf('}');\n      if(a>=0&&b>a) s=s.slice(a,b+1);\n      return JSON.parse(s);\n    }catch(e){return null;}\n  }\n\n  fallback(){\n    const cat=(arr)=>{\n      let no=0,maybe=0; arr.forEach(v=>{if(v==='No')no++;else if(v==='Maybe')maybe++;});\n      if(arr[3]==='Yes'&&no===0&&maybe<=1) return 'D';\n      if(no>=2) return 'A';\n      if(no>=1||maybe>=2) return 'B';\n      return 'C';\n    };\n    const a=this.state.answers;\n    const det=this.detectMembers();\n    const rank={A:4,B:3,C:2,D:1};\n    // Staffing presence sets the FLOOR: 2+ NE members => A, exactly 1 => B, 0 => no floor.\n    const floor=(n)=> n>=2 ? 'A' : (n===1 ? 'B' : 'D');\n    const combine=(catTier,n)=>{const f=floor(n);return rank[f]>rank[catTier]?f:catTier;};\n    const d=combine(cat(a.design),det.design.length);\n    const p=combine(cat(a.planning),det.planning.length);\n    const i=combine(cat(a.innovation),det.innovation.length);\n    let overall=[d,p,i].sort((x,y)=>rank[y]-rank[x])[0];\n    if(this.state.strategic['Strategic client']&&rank[overall]<rank['B']) overall='B';\n    const total=det.design.length+det.planning.length+det.innovation.length;\n    let reasoning;\n    if(total>=2){\n      reasoning='This project is already staffed with '+total+' National Expertise members ('+[det.design.length?det.design.length+' Design':'',det.planning.length?det.planning.length+' Planning':'',det.innovation.length?det.innovation.length+' Innovation':''].filter(Boolean).join(', ')+'), so that expertise is actively engaged — which is what drives the higher tier here, regardless of how capable the team is. The capability answers then refine the per-discipline levels below.';\n    }else if(total===1){\n      reasoning='One National Expertise member is already on the team, which points to a guiding (B/C) level of involvement; the capability answers refine where leadership may want to add or pull back support.';\n    }else{\n      reasoning='No National Expertise members are currently staffed, so the tier reflects the capability answers: stronger \"Yes\" responses trend toward local delivery, while \"Maybe\" or \"No\" responses suggest National Expertise should be added.';\n    }\n    return {\n      opener:\"Here's a starting point for the team to react to — the recommendation below is a prompt for conversation, not a decision.\",\n      tier:overall,\n      reasoning:reasoning,\n      engagement:{design:d,planning:p,innovation:i},\n      discussion:[\n        'Given who is already on the team, is this the level of National Expertise leadership we intend for this project?',\n        'Where could we right-size involvement — lead, guide, or support — without compromising BSA excellence?',\n        'Is there a talent-development or strategic reason to adjust the level beyond what staffing and capability suggest?'\n      ]\n    };\n  }\n\n  async generate(){\n    this.setState({view:'evaluate',evalStep:3,ai:{status:'loading',result:null,error:null}});\n    const prompt=this.buildPrompt();\n    try{\n      if(!(window.claude&&window.claude.complete)) throw new Error('no-helper');\n      const raw=await window.claude.complete(prompt);\n      const json=this.extractJSON(raw);\n      if(!json||!json.tier) throw new Error('bad-json');\n      this.setState({ai:{status:'done',result:json,error:null}});\n    }catch(err){\n      this.setState({ai:{status:'done',result:this.fallback(),error:'local'}});\n    }\n  }\n\n  renderVals(){\n    const S=this.state;\n    const navDefs=[\n      {id:'portfolio',label:'Tracked Projects',sub:'Top projects & tiers'},\n      {id:'evaluate',label:'Evaluate a Project',sub:'Intake & recommendation'},\n      {id:'directory',label:'Team Directory',sub:'National Expertise'},\n      {id:'todos',label:'To-Dos',sub:'Follow-ups & owners'},\n      {id:'growth',label:'Development & Growth',sub:'Junior talent pipeline'},\n      {id:'framework',label:'Engagement Framework',sub:'Tiers A–D'}\n    ];\n    const nav=navDefs.map(it=>{const a=S.view===it.id;return {label:it.label,sub:it.sub,active:a,bg:a?'#FAF9F7':'#fff',bl:a?'3px solid #D6202E':'3px solid transparent',fg:'#16181D',subfg:'#A7A9AE',onClick:()=>this.nav(it.id)};});\n    const current=navDefs.find(n=>n.id===S.view)||navDefs[0];\n    const currentLabel=current.label, currentKicker=current.sub;\n    const chevron=S.menuOpen?'rotate(180deg)':'rotate(0deg)';\n\n    const projects=S.projects;\n    const tierA=projects.filter(p=>p.tier==='A').length;\n    const tierD=projects.filter(p=>p.tier==='D').length;\n    const tierRank={A:0,B:1,C:2,D:3};\n    const sortedProjects=projects.slice().sort((a,b)=>{\n      let cmp;\n      if(S.sortKey==='tier'){\n        const ra=tierRank[a.tier]!==undefined?tierRank[a.tier]:99;\n        const rb=tierRank[b.tier]!==undefined?tierRank[b.tier]:99;\n        cmp=ra-rb;\n        if(cmp===0) cmp=a.name.localeCompare(b.name);\n      }else if(S.sortKey==='principal'){\n        cmp=(a.principal||'~').localeCompare(b.principal||'~');\n        if(cmp===0) cmp=a.name.localeCompare(b.name);\n      }else if(S.sortKey==='fee'){\n        cmp=(a.fee||0)-(b.fee||0);\n        if(cmp===0) cmp=a.name.localeCompare(b.name);\n      }else{\n        cmp=a.name.localeCompare(b.name);\n      }\n      return S.sortDir==='asc'?cmp:-cmp;\n    });\n    const arrow=S.sortDir==='asc'?'↑':'↓';\n    const sortControls=[{key:'name',label:'Name'},{key:'tier',label:'Tier'},{key:'principal',label:'Principal'},{key:'fee',label:'BSA Fee'}].map(c=>{const active=S.sortKey===c.key;return {label:active?(c.label+' '+arrow):c.label,active,bg:active?'#16181D':'#fff',fg:active?'#fff':'#5C5F66',bc:active?'#16181D':'#E2E0DC',onClick:()=>this.setSort(c.key)};});\n    const gaps=projects.filter(p=>(p.tier==='A'||p.tier==='B')&&(!p.design.length||!p.planning.length||!p.innovation.length)).length;\n    const kpis=[\n      {value:String(projects.length),label:'Active projects in portfolio',accent:'#16181D'},\n      {value:String(tierA),label:'Tier A — National Expertise leading',accent:'#D6202E'},\n      {value:String(gaps),label:'Open assignments to decide',accent:gaps?'#D98A1F':'#16181D'},\n      {value:String(tierD),label:'Delivered locally · Tier D',accent:'#2B3D5C'}\n    ];\n    const projectRows=sortedProjects.map(p=>{\n      const unset=!['A','B','C','D'].includes(p.tier);\n      const mk=(field,arr)=>({field,people:arr||[],empty:!(arr&&arr.length),onEdit:()=>this.openEditor(p.id,field)});\n      return {\n        id:p.id,name:p.name,practice:p.practice,\n        principal:p.principal||'—',\n        fee:this.fmtFee(p.fee),\n        tier:unset?'—':p.tier,\n        tierColor:unset?'#EDEBE7':this.tc(p.tier),\n        tierFg:unset?'#A7A9AE':'#fff',\n        tierBorder:unset?'1px dashed #D2D0CC':'0',\n        onEditTier:()=>this.openEditor(p.id,'tier'),\n        onDelete:()=>this.deleteProject(p.id),\n        cells:[mk('design',p.design),mk('planning',p.planning),mk('innovation',p.innovation)]\n      };\n    });\n\n    const ed=S.editor;\n    let editorOpen=ed.open,editorIsTier=false,editorIsPeople=false,editorPro
